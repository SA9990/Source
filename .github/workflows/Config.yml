name: Kernel Build (LLVM_config_build)

on:
  workflow_dispatch:

env:
  TZ: Asia/Kolkata

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Kernel Source
        uses: actions/checkout@v4.2.2

      - name: Install Build Dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            git \
            ccache \
            build-essential \
            bc \
            bison \
            flex \
            libssl-dev \
            libncurses-dev \
            liblz4-tool \
            libzstd-dev \
            zstd \
            curl \
            python3 \
            unzip \
            aria2 \
            device-tree-compiler \
            binutils-aarch64-linux-gnu

      - name: Download LLVM Toolchain
        run: |
          TOOLCHAIN_DIR="$HOME/toolchains/llvm"
          mkdir -p "$TOOLCHAIN_DIR"
          cd "$TOOLCHAIN_DIR"

          curl -LO "https://github.com/llvm/llvm-project/releases/download/llvmorg-20.1.5/LLVM-20.1.5-Linux-X64.tar.xz"
          tar -xf LLVM-20.1.5-Linux-X64.tar.xz --strip-components=1

      - name: Configure and Build Kernel
        run: |
          export PATH="$HOME/toolchains/llvm/bin:$PATH"
          make distclean

          make -j$(nproc) \
            O=out \
            vendor/obiwan_defconfig \
            ARCH=arm64 \
            CC=clang \
            CROSS_COMPILE=aarch64-linux-gnu- \
            LLVM=1 \
            LLVM_IAS=1


      - name: Upload .config File
        run: |
          CONFIG_PATH=$(find out/ -name ".config" | head -n 1)
          echo "Found config at: $CONFIG_PATH"
          mkdir -p config_upload
          cp "$CONFIG_PATH" config_upload/kernel.config
        shell: bash

      - name: Upload Kernel .config File Artifact
        uses: actions/upload-artifact@v4.6.2
        with:
          name: KernelConfig
          path: config_upload/kernel.config
